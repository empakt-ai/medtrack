<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Family - MedTrak</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdcc3",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#adc7f9",
                        "surface-container-low": "#f6f3f2",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-primary-fixed": "#001b3e",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#7ffc97",
                        "on-tertiary-fixed": "#2f1500",
                        "outline": "#74777f",
                        "inverse-on-surface": "#f3f0ef",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e5e2e1",
                        "on-error-container": "#93000a",
                        "on-background": "#1c1b1b",
                        "background": "#fcf9f8",
                        "error": "#ba1a1a",
                        "inverse-surface": "#313030",
                        "surface-tint": "#455f8a",
                        "tertiary": "#2b1300",
                        "on-surface": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "on-tertiary-container": "#df7c0f",
                        "on-secondary-fixed": "#002109",
                        "secondary": "#006e2d",
                        "primary": "#001839",
                        "tertiary-container": "#492400",
                        "on-secondary-fixed-variant": "#005320",
                        "on-secondary-container": "#007230",
                        "outline-variant": "#c4c6d0",
                        "primary-fixed": "#d6e3ff",
                        "on-primary-container": "#7c95c4",
                        "surface-container-highest": "#e5e2e1",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "surface-container-high": "#ebe7e7",
                        "secondary-container": "#7cf994",
                        "surface": "#fcf9f8",
                        "on-surface-variant": "#44474f",
                        "surface-container": "#f0edec",
                        "surface-dim": "#dcd9d9",
                        "inverse-primary": "#adc7f9",
                        "primary-container": "#0f2d56",
                        "on-primary-fixed-variant": "#2d4771",
                        "secondary-fixed-dim": "#62df7d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin-desktop": "auto",
                        "gutter": "16px",
                        "max-width-content": "640px",
                        "touch-target": "56px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "button-text": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcf9f8; /* Warm white background from design system */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shadow-soft {
            box-shadow: 0px 4px 20px rgba(15, 45, 86, 0.08);
        }
        .floating-label-container:focus-within label {
            transform: translateY(-20px) scale(0.85);
            color: #001839;
            font-weight: 600;
        }
        .floating-label-container label {
            transition: all 0.2s ease-out;
            pointer-events: none;
        }
        .monospace-box {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor (As per Shared Components JSON) -->
<!-- Note: TopAppBar is excluded here as it's a "Focused Journey" (Creation Flow) as per Shell Visibility rules -->
<header class="w-full h-14 flex items-center px-margin-mobile md:max-w-max-width-content mx-auto mb-8">
<button class="p-2 -ml-2 text-on-surface hover:bg-surface-container-low rounded-full transition-colors" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</header>
<main class="w-full max-w-max-width-content px-margin-mobile flex-grow flex flex-col">
<!-- Headline -->
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg text-primary mb-8 text-center md:text-left">
            Create a Family
        </h1>
<!-- Content Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-soft flex flex-col gap-8 mb-12">
<!-- Illustrated Anchor -->
<div class="flex justify-center mb-2">
<div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">group_add</span>
</div>
</div>
<!-- Input Group -->
<div class="relative floating-label-container">
<input class="w-full h-touch-target px-4 pt-4 border border-outline-variant rounded-lg bg-transparent focus:border-primary focus:ring-0 peer outline-none transition-all" id="family_name" placeholder=" " type="text"/>
<label class="absolute left-4 top-4 text-on-surface-variant text-body-md peer-focus:text-primary peer-placeholder-shown:translate-y-0 peer-focus:-translate-y-4 peer-focus:scale-90 transform origin-top-left" for="family_name">
                    Family group name
                </label>
<p class="mt-2 text-label-md text-on-surface-variant opacity-70">e.g. The Khan Family</p>
</div>
<div class="h-px bg-surface-container-high w-full"></div>
<!-- Invite Code Display -->
<div class="flex flex-col items-center gap-4">
<p class="text-label-md text-on-surface-variant font-semibold tracking-wider uppercase">Your Invite Code</p>
<div class="w-full bg-surface-container flex items-center justify-between p-6 rounded-xl border-2 border-dashed border-outline-variant group hover:border-primary transition-colors cursor-pointer" onclick="copyCode()">
<span class="monospace-box text-headline-md tracking-widest text-primary" id="inviteCode">K9X2P4</span>
<button class="flex items-center gap-2 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
<p class="text-label-md text-on-surface-variant text-center">Share this code with family members.</p>
</div>
</div>
<!-- Call to Action -->
<div class="mt-auto pb-10">
<button class="w-full h-touch-target bg-primary text-on-primary font-button-text text-button-text rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Create Group
                <span class="material-symbols-outlined">chevron_right</span>
</button>
<p class="mt-4 text-center text-label-md text-on-surface-variant px-8">
                By creating a group, you agree to our 
                <a class="underline font-semibold text-primary" href="#">Health Data Terms</a>.
            </p>
</div>
</main>
<!-- Toast Notification for Copy -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full text-label-md opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2" id="toast">
<span class="material-symbols-outlined text-sm">check_circle</span>
        Code copied to clipboard
    </div>
<!-- No BottomNavBar for focused transactional screen -->
<script>
        function copyCode() {
            const code = document.getElementById('inviteCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0');
                setTimeout(() => {
                    toast.classList.add('opacity-0');
                }, 2000);
            });
        }

        // Simple animation for the invite code box
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('family_name');
            input.focus();
        });
    </script>
</body></html>
