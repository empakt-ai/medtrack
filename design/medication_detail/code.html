<!-- Micro-interaction Script -->
<script>
        const scrim = document.getElementById('scrim');
        const sheet = document.getElementById('bottom-sheet');
        const closeBtn = document.getElementById('close-btn');

        function closeSheet() {
            sheet.classList.remove('bottom-sheet-active');
            scrim.classList.remove('scrim-active');
            
            // Wait for animation before (simulated) navigation or UI change
            setTimeout(() => {
                // In a real app, this would trigger navigation back
                console.log('Navigating back...');
                sheet.style.display = 'none';
                scrim.style.display = 'none';
            }, 400);
        }

        closeBtn.addEventListener('click', closeSheet);
        scrim.addEventListener('click', closeSheet);

        // Simple drag visual interaction (purely visual for this demo)
        let touchStartY = 0;
        sheet.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        sheet.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].clientY;
            const diff = currentY - touchStartY;
            if (diff > 0) {
                sheet.style.transform = `translateY(${diff}px)`;
            }
        });

        sheet.addEventListener('touchend', (e) => {
            const currentY = e.changedTouches[0].clientY;
            const diff = currentY - touchStartY;
            if (diff > 150) {
                closeSheet();
            } else {
                sheet.style.transform = '';
            }
        });
    </script>
