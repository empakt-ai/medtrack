<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CareCycle — Push Notification Permissions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .bell-animation {
            animation: ring 4s ease-in-out infinite;
        }
        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            5%, 15% { transform: rotate(15deg); }
            10%, 20% { transform: rotate(-15deg); }
            25% { transform: rotate(0); }
        }
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#e5e2e1",
                    "outline": "#74777f",
                    "tertiary-fixed-dim": "#ffb77d",
                    "tertiary-container": "#492400",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c4c6d0",
                    "on-surface-variant": "#44474f",
                    "on-error": "#ffffff",
                    "tertiary": "#2b1300",
                    "surface-dim": "#dcd9d9",
                    "primary-fixed": "#d6e3ff",
                    "surface-variant": "#e5e2e1",
                    "on-surface": "#1c1b1b",
                    "on-primary-fixed-variant": "#2d4771",
                    "on-secondary-container": "#007230",
                    "on-tertiary-container": "#df7c0f",
                    "secondary-container": "#7cf994",
                    "on-primary-fixed": "#001b3e",
                    "on-error-container": "#93000a",
                    "primary": "#001839",
                    "on-tertiary-fixed": "#2f1500",
                    "on-secondary-fixed": "#002109",
                    "surface-container-low": "#f6f3f2",
                    "background": "#fcf9f8",
                    "primary-container": "#0f2d56",
                    "inverse-surface": "#313030",
                    "secondary": "#006e2d",
                    "inverse-on-surface": "#f3f0ef",
                    "secondary-fixed": "#7ffc97",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#ebe7e7",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#f0edec",
                    "primary-fixed-dim": "#adc7f9",
                    "surface-bright": "#fcf9f8",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "on-primary": "#ffffff",
                    "on-background": "#1c1b1b",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005320",
                    "surface-tint": "#455f8a",
                    "surface": "#fcf9f8",
                    "tertiary-fixed": "#ffdcc3",
                    "on-primary-container": "#7c95c4",
                    "secondary-fixed-dim": "#62df7d",
                    "inverse-primary": "#adc7f9",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "max-width-content": "640px",
                    "gutter": "16px",
                    "margin-mobile": "20px",
                    "margin-desktop": "auto",
                    "touch-target": "56px",
                    "base": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "button-text": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "button-text": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                    "headline-lg-mobile": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center">
<!-- TopAppBar (Supressed for Transactional Intent) -->
<!-- As per mandate, navigation is suppressed for task-focused confirmation screens -->
<main class="w-full max-w-max-width-content px-margin-mobile flex flex-col items-center justify-center py-12">
<!-- Main Permission Card -->
<div class="fade-in-up bg-surface-container-lowest shadow-[0px_4px_20px_rgba(15,45,86,0.08)] rounded-[32px] w-full p-10 flex flex-col items-center text-center">
<!-- Icon Cluster -->
<div class="relative mb-10">
<!-- Outer Ring -->
<div class="absolute -inset-4 bg-primary/5 rounded-full animate-pulse"></div>
<!-- Main Navy Circle -->
<div class="relative w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary text-[48px] bell-animation" style="font-variation-settings: 'FILL' 1;">notifications</span>
</div>
<!-- Small Supporting Badge -->
<div class="absolute -bottom-1 -right-1 w-8 h-8 bg-secondary rounded-full border-4 border-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Content -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-4 tracking-tight">
                Never miss a dose
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto leading-relaxed mb-12">
                Allow MedTrak to send you reminders when it's time to take your medications.
            </p>
<!-- Illustration / Decoration -->
<div class="w-full mb-12 h-32 relative overflow-hidden rounded-2xl">
<div class="absolute inset-0 opacity-10">
<div class="w-full h-full" style="background-image: radial-gradient(#001839 1px, transparent 1px); background-size: 16px 16px;"></div>
</div>
<div class="relative h-full flex items-center justify-center gap-4">
<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">pill</span>
</div>
<div class="w-1 bg-outline-variant/30 h-8 rounded-full"></div>
<div class="w-12 h-12 rounded-xl bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">alarm</span>
</div>
<div class="w-1 bg-outline-variant/30 h-8 rounded-full"></div>
<div class="w-12 h-12 rounded-xl bg-tertiary-fixed-dim/20 flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant">calendar_today</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-4">
<button class="w-full h-touch-target bg-primary text-on-primary font-button-text text-button-text rounded-full flex items-center justify-center hover:opacity-90 active:scale-95 transition-all duration-200 shadow-md" onclick="handlePermission()">
                    Allow Notifications
                </button>
<button class="w-full h-touch-target bg-transparent text-primary font-button-text text-button-text rounded-full flex items-center justify-center hover:bg-surface-container-low active:scale-95 transition-all duration-200" onclick="window.history.back()">
                    Maybe Later
                </button>
</div>
</div>
<!-- Privacy Assurance -->
<div class="mt-8 flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-[18px]">lock</span>
<span class="font-label-md text-label-md">Your health data is always encrypted</span>
</div>
</main>
<!-- Contextual Information (Optional Decorative Element) -->
<div class="fixed inset-0 -z-10 bg-background pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<script>
        function handlePermission() {
            // Visual feedback for interaction
            const btn = event.currentTarget;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Syncing Preferences...
            `;
            
            // Mock delay for feeling of "reliability" as per brand identity
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined mr-2">check_circle</span>
                    Notifications Enabled
                `;
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                // Trigger success sound or haptic feedback mock
                console.log("Push notifications allowed");
            }, 1200);
        }

        // Handle ripple effect for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);
                setTimeout(() => { ripples.remove() }, 1000);
            });
        });
    </script>
</body></html>
