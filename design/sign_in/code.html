<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Top Navigation Bar (Branding only for login) -->
<header class="w-full top-0 bg-background transition-colors duration-200">
<div class="flex items-center justify-center h-14 px-margin-mobile w-full max-w-max-width-content mx-auto">
<div class="flex items-center gap-2 text-headline-md font-headline-md text-primary">
<span class="material-symbols-outlined" data-icon="pill">pill</span>
<span class="font-headline-md text-headline-md">MedTrak</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pb-12">
<!-- Animated Background Element (Subtle atmosphere) -->
<div class="fixed inset-0 pointer-events-none opacity-40 z-0">

</div>
<div class="relative z-10 w-full max-w-max-width-content">
<!-- Hero Illustration/Visual -->
<div class="mb-10 text-center">
<div class="inline-block p-4 bg-white rounded-full soft-elevation mb-6">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'wght' 300;">shield_person</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-2">Welcome back</h1>
<p class="text-on-surface-variant font-body-md text-body-md">Sign in to manage your family's health.</p>
</div>
<!-- Sign In Card -->
<div class="bg-white rounded-xl soft-elevation p-8 w-full">
<form class="flex flex-col gap-6" onsubmit="return false;">
<!-- Email Field -->
<div class="relative flex flex-col floating-label-input">
<div class="h-touch-target w-full rounded-lg border border-outline-variant flex items-center px-4 focus-within:border-primary focus-within:border-2 transition-all group">
<input class="w-full h-full bg-transparent border-none outline-none focus:ring-0 text-on-surface text-body-md peer" id="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-md bg-white px-1" for="email">Email Address</label>
</div>
</div>
<!-- Password Field -->
<div class="relative flex flex-col floating-label-input">
<div class="h-touch-target w-full rounded-lg border border-outline-variant flex items-center px-4 focus-within:border-primary focus-within:border-2 transition-all group">
<input class="w-full h-full bg-transparent border-none outline-none focus:ring-0 text-on-surface text-body-md peer" id="password" placeholder=" " required="" type="password"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-md bg-white px-1" for="password">Password</label>
<button class="text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end -mt-2">
<a class="text-primary font-label-md text-label-md hover:underline" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="h-touch-target w-full bg-primary text-on-primary rounded-lg font-button-text text-button-text active:scale-[0.98] transition-transform flex items-center justify-center gap-2" type="submit">
                        Sign In
                    </button>
<!-- Sign Up Link -->
<div class="text-center mt-2">
<p class="text-on-surface-variant font-body-md text-body-md">
                            Don't have an account? 
                            <a class="text-primary font-button-text text-button-text hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</form>

<!-- Success Feedback Overlay (Hidden by default) -->
<div class="fixed inset-0 z-50 bg-background/80 backdrop-blur-sm flex items-center justify-center hidden opacity-0 transition-opacity duration-300" id="success-feedback">
<div class="bg-white p-8 rounded-xl soft-elevation flex flex-col items-center max-w-xs text-center">
<div class="w-16 h-16 bg-secondary-container rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="text-headline-md font-headline-md text-primary mb-2">Authenticating</h2>
<p class="text-on-surface-variant">Connecting to your secure health profile...</p>
</div>
</div>
<script>
        // Micro-interactions for form
        const loginForm = document.querySelector('form');
        const successFeedback = document.getElementById('success-feedback');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Show feedback
            successFeedback.classList.remove('hidden');
            setTimeout(() => {
                successFeedback.classList.add('opacity-100');
            }, 10);

            // Simulate redirect after success
            setTimeout(() => {
                console.log("Redirecting to dashboard...");
                // In a real app: window.location.href = '/dashboard';
            }, 2000);
        });

        // Add subtle scale animation to labels on focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-sm');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-sm');
            });
        });
    </script>
