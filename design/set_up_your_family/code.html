<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedTrak — Setup Your Family</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .card-shadow {
            box-shadow: 0px 4px 20px rgba(15, 45, 86, 0.08);
        }
        .interactive-scale:active {
            transform: scale(0.98);
            transition: transform 0.1s ease-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error": "#ffffff",
                      "tertiary-fixed": "#ffdcc3",
                      "error-container": "#ffdad6",
                      "primary-fixed-dim": "#adc7f9",
                      "surface-container-low": "#f6f3f2",
                      "tertiary-fixed-dim": "#ffb77d",
                      "on-primary-fixed": "#001b3e",
                      "on-primary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed": "#7ffc97",
                      "on-tertiary-fixed": "#2f1500",
                      "outline": "#74777f",
                      "inverse-on-surface": "#f3f0ef",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e5e2e1",
                      "on-error-container": "#93000a",
                      "on-background": "#1c1b1b",
                      "background": "#fcf9f8",
                      "error": "#ba1a1a",
                      "inverse-surface": "#313030",
                      "surface-tint": "#455f8a",
                      "tertiary": "#2b1300",
                      "on-surface": "#1c1b1b",
                      "on-tertiary-fixed-variant": "#6e3900",
                      "on-tertiary-container": "#df7c0f",
                      "on-secondary-fixed": "#002109",
                      "secondary": "#006e2d",
                      "primary": "#001839",
                      "tertiary-container": "#492400",
                      "on-secondary-fixed-variant": "#005320",
                      "on-secondary-container": "#007230",
                      "outline-variant": "#c4c6d0",
                      "primary-fixed": "#d6e3ff",
                      "on-primary-container": "#7c95c4",
                      "surface-container-highest": "#e5e2e1",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#fcf9f8",
                      "surface-container-high": "#ebe7e7",
                      "secondary-container": "#7cf994",
                      "surface": "#fcf9f8",
                      "on-surface-variant": "#44474f",
                      "surface-container": "#f0edec",
                      "surface-dim": "#dcd9d9",
                      "inverse-primary": "#adc7f9",
                      "primary-container": "#0f2d56",
                      "on-primary-fixed-variant": "#2d4771",
                      "secondary-fixed-dim": "#62df7d"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "margin-desktop": "auto",
                      "gutter": "16px",
                      "max-width-content": "640px",
                      "touch-target": "56px",
                      "margin-mobile": "20px"
              },
              "fontFamily": {
                      "body-md": ["Plus Jakarta Sans"],
                      "label-md": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "button-text": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "600"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 bg-background sticky z-10">
<div class="flex items-center justify-center h-14 px-margin-mobile w-full max-w-max-width-content mx-auto">
<div class="flex items-center gap-2 text-headline-md font-headline-md text-primary dark:text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="pill">pill</span>
<span class="font-bold tracking-tight">MedTrak</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="max-w-max-width-content mx-auto px-margin-mobile pt-12 pb-32">
<!-- Animated Visual Accent (Subtle Warmth) -->
<div class="mb-12 relative h-40 w-full overflow-hidden rounded-xl bg-surface-container-low border border-outline-variant/30">

<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-surface/80 backdrop-blur-md p-4 rounded-full card-shadow">
<span class="material-symbols-outlined text-primary scale-150" data-icon="family_history" style="font-variation-settings: 'opsz' 48;">family_history</span>
</div>
</div>
</div>
<!-- Header Section -->
<div class="mb-12 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-3">
                Set up your family
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Choose how you want to get started.
            </p>
</div>
<!-- Choice Cards Section -->
<div class="flex flex-col gap-6">
<!-- Card 1: Start a family group (Primary) -->
<button class="interactive-scale flex flex-col items-start p-8 rounded-xl bg-primary text-on-primary card-shadow text-left w-full transition-all duration-300 hover:brightness-110 min-h-[140px] relative overflow-hidden group" onclick="window.location.hash='#create'">
<div class="absolute -right-4 -top-4 opacity-10 transform group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" data-icon="family_restroom">family_restroom</span>
</div>
<div class="flex items-center gap-3 mb-3">
<div class="bg-on-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="pill" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
<span class="font-headline-md text-headline-md">Start a family group</span>
</div>
<p class="font-body-md text-body-md text-on-primary/80 max-w-[85%]">
                    You'll manage medications and share an invite code.
                </p>
<div class="mt-6 flex items-center gap-2 font-button-text text-button-text self-end">
<span>Continue</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
<!-- Card 2: Join a family group (Outlined) -->
<button class="interactive-scale flex flex-col items-start p-8 rounded-xl bg-surface card-shadow border-2 border-primary text-primary text-left w-full transition-all duration-300 hover:bg-surface-container-low min-h-[140px] relative overflow-hidden group" onclick="window.location.hash='#join'">
<div class="absolute -right-4 -top-4 opacity-[0.03] text-primary transform group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" data-icon="group_add">group_add</span>
</div>
<div class="flex items-center gap-3 mb-3">
<div class="bg-primary/5 p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="family_restroom">family_restroom</span>
</div>
<span class="font-headline-md text-headline-md">Join a family group</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[85%]">
                    Enter an invite code from your caretaker.
                </p>
<div class="mt-6 flex items-center gap-2 font-button-text text-button-text self-end">
<span>Enter Code</span>
<span class="material-symbols-outlined text-lg" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
</button>
</div>
<!-- Secondary Information -->
<div class="mt-12 p-6 rounded-xl bg-surface-container border border-outline-variant/30 flex gap-4 items-start">
<span class="material-symbols-outlined text-on-tertiary-container mt-1" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<div class="flex flex-col gap-1">
<h4 class="font-label-md text-label-md text-primary uppercase tracking-wider">Privacy first</h4>
<p class="font-body-md text-body-md text-on-surface-variant">Your health data is encrypted and only shared with the family members you explicitly approve.</p>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed for this step as per Dest Rule, but including placeholder logic for layout consistency if needed later) -->
<!-- Note: Following "Shell Visibility & Relevance" rule, navigation is suppressed on this Onboarding screen -->
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Visual feedback for interactions
            const cards = document.querySelectorAll('button');
            cards.forEach(card => {
                card.addEventListener('mousedown', () => {
                    card.style.transform = 'scale(0.97)';
                });
                card.addEventListener('mouseup', () => {
                    card.style.transform = 'scale(1)';
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body></html>
