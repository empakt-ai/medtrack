<!DOCTYPE html>

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f7f4; /* Explicit Warm White Brand Override */
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        /* Floating Label Logic */
        .input-container {
            position: relative;
            height: 56px;
        }

        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: all 0.2s ease-out;
            pointer-events: none;
            color: #74777f; /* outline color */
        }

        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 8px;
            transform: translateY(0);
            font-size: 12px;
            color: #001839; /* primary color */
            font-weight: 600;
        }

        .floating-input {
            padding-top: 20px;
            padding-left: 16px;
            padding-right: 16px;
            height: 56px;
            border: 1px solid #E2E2E2;
            border-radius: 8px;
            width: 100%;
            background: transparent;
            outline: none;
            transition: border-width 0.1s ease, border-color 0.2s ease;
        }

        .floating-input:focus {
            border: 2px solid #001839; /* primary color */
            padding-left: 15px; /* Adjust for border width change */
        }

        .card-shadow {
            box-shadow: 0px 4px 20px rgba(15, 45, 86, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-0 bg-background text-on-background">
<!-- Brand Header -->
<header class="w-full max-w-max-width-content mx-auto mb-8 flex justify-center items-center gap-2">
<div class="flex items-center gap-2 text-primary font-headline-md text-headline-md">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">pill</span>
<span class="tracking-tight">MedTrak</span>
</div>
</header>
<!-- Sign Up Card -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl card-shadow overflow-hidden">
<div class="p-8 md:p-12">
<div class="text-center mb-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Join the Family</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Manage medications with confidence and ease.</p>
</div>
<form class="space-y-4" onsubmit="return false;">
<!-- Full Name -->
<div class="input-container group">
<input class="floating-input font-body-md text-body-md text-on-surface" id="full_name" placeholder=" " type="text"/>
<label class="floating-label font-body-md" for="full_name">Full name</label>
</div>
<!-- Email -->
<div class="input-container group">
<input class="floating-input font-body-md text-body-md text-on-surface" id="email" placeholder=" " type="email"/>
<label class="floating-label font-body-md" for="email">Email address</label>
</div>
<!-- Password -->
<div class="input-container group">
<input class="floating-input font-body-md text-body-md text-on-surface" id="password" placeholder=" " type="password"/>
<label class="floating-label font-body-md" for="password">Password</label>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Confirm Password -->
<div class="input-container group">
<input class="floating-input font-body-md text-body-md text-on-surface" id="confirm_password" placeholder=" " type="password"/>
<label class="floating-label font-body-md" for="confirm_password">Confirm Password</label>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target bg-primary text-on-primary font-button-text text-button-text rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center mt-8" type="submit">
                    Create Account
                </button>
</form>
<!-- Bottom Navigation -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-button-text hover:underline decoration-2 underline-offset-4" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Decorative Footer Accent -->
<div class="h-1.5 w-full bg-secondary-container"></div>
</main>
<!-- Terms and Privacy -->
<footer class="mt-8 text-center max-w-max-width-content px-margin-mobile">
<p class="font-label-md text-[12px] text-outline leading-tight">
            By creating an account, you agree to MedTrak's <br class="md:hidden"/>
<a class="underline" href="#">Terms of Service</a> and <a class="underline" href="#">Privacy Policy</a>.
        </p>
</footer>
<!-- Background Decoration (Subtle) -->
<div class="fixed top-[-10%] right-[-5%] w-96 h-96 bg-primary opacity-[0.03] rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-80 h-80 bg-secondary opacity-[0.03] rounded-full blur-3xl pointer-events-none"></div>
<script>
        // Simple micro-interaction for password visibility toggle
        document.querySelectorAll('button .material-symbols-outlined').forEach(icon => {
            if (icon.textContent === 'visibility') {
                icon.parentElement.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility_off';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility';
                    }
                });
            }
        });

        // Simple scale effect on button press
        const btn = document.querySelector('button[type="submit"]');
        btn.addEventListener('mousedown', () => btn.classList.add('scale-[0.97]'));
        btn.addEventListener('mouseup', () => btn.classList.remove('scale-[0.97]'));
        btn.addEventListener('mouseleave', () => btn.classList.remove('scale-[0.97]'));
    </script>
</body></html>
